<script>
gsap.registerPlugin(ScrollTrigger);

class AnimationController {
    constructor() {
        this.signaturePath = document.querySelector('.signature-line');
        this.navLinks = document.querySelectorAll('.nav-link');
        this.galleryItems = document.querySelectorAll('.gallery-item');
        this.heroSection = document.querySelector('.hero-section');
        this.modal = document.getElementById('image-modal');
        this.modalImg = document.getElementById('modal-image');
        this.modalCaption = document.getElementById('modal-caption');
        this.closeModalBtn = document.querySelector('.close-modal');
                       
        this.init();
    }

    init() {
        this.initLogoAnimation();
        this.initHoverEffects();
        this.initLightbox();
    }

    initLogoAnimation() {
        if (!this.signaturePath) return;
        const pathLength = this.signaturePath.getTotalLength();
        gsap.set(this.signaturePath, {
            strokeDasharray: pathLength,
            strokeDashoffset: pathLength,
            stroke: '#FAF9F6',
            fill: 'transparent',
            opacity: 1
        });

        gsap.timeline()
            .to(this.signaturePath, {
                strokeDashoffset: 0,
                duration: 5.2,
                ease: 'power2.inOut',
                delay: 0.4
            }, 0)
            .to(this.signaturePath, {
                fill: '#FAF9F6',
                stroke: 'transparent',
                duration: 0.8,
                ease: 'power2.out'
            }, '2.9');
    }

    initHoverEffects() {
        this.navLinks.forEach(link => {
            link.addEventListener('mouseenter', () => {
                gsap.to(link, { color: 'var(--accent-warm)', duration: 0.3, overwrite: 'auto' });
            });
            link.addEventListener('mouseleave', () => {
                if(!link.classList.contains('active')) {
                    gsap.to(link, { color: 'var(--text-muted)', duration: 0.3, overwrite: 'auto' });
                }
            });
        });

        this.galleryItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                gsap.to(item, { y: -10, duration: 0.6, ease: 'power2.out', overwrite: 'auto' });
                gsap.to(item.querySelector('img'), { scale: 1.08, duration: 0.8, ease: 'power2.out', overwrite: 'auto' });
            });
            item.addEventListener('mouseleave', () => {
                gsap.to(item, { y: 0, duration: 0.6, ease: 'power2.out', overwrite: 'auto' });
                gsap.to(item.querySelector('img'), { scale: 1, duration: 0.8, ease: 'power2.out', overwrite: 'auto' });
            });
        });
    }

    initLightbox() {
        if (!this.modal) return;
        this.galleryItems.forEach(item => {
            item.addEventListener('click', () => {
                const img = item.querySelector('img');
                const title = item.querySelector('.item-title');
                this.modalImg.src = img.src;
                this.modalCaption.textContent = title ? title.textContent : '';
                this.modal.classList.add('active');
                gsap.fromTo(this.modal, { opacity: 0 }, { opacity: 1, duration: 0.4, ease: 'power2.out' });
            });
        });

        const closeModal = () => {
            gsap.to(this.modal, {
                opacity: 0,
                duration: 0.4,
                ease: 'power2.in',
                onComplete: () => {
                    this.modal.classList.remove('active');
                    this.modalImg.src = '';
                }
            });
        };

        this.closeModalBtn.addEventListener('click', closeModal);
        this.modal.addEventListener('click', (e) => {
            if (e.target === this.modal) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && this.modal.classList.contains('active')) closeModal();
        });
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new AnimationController();

    // Light/Dark Mode Logic
    const themeBtn = document.getElementById('theme-toggle');
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'light') {
        document.body.classList.add('light-mode');
        themeBtn.textContent = 'Dark Mode';
    }
    themeBtn.addEventListener('click', function() {
        document.body.classList.toggle('light-mode');
        if(document.body.classList.contains('light-mode')) {
            this.textContent = 'Dark Mode';
            localStorage.setItem('theme', 'light');
        } else {
            this.textContent = 'Light Mode';
            localStorage.setItem('theme', 'dark');
        }
    });
});
</script>
